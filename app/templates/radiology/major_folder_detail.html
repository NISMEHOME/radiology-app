{% extends "base.html" %}

{% block title %}Saisie résultats{% endblock %}

{% block content %}
<div class="container py-4">

    <h2 class="mb-4">🩻 Saisie des résultats</h2>

    <div class="card p-4 mb-4">
        <h5>📁 Dossier : {{ folder.folder_number }}</h5>
        <p>
            👤 {{ folder.patient.first_name }} {{ folder.patient.last_name }}
        </p>
    </div>

    <form method="POST">
        <div class="card p-4">

            {% for exam in exams %}
            <div class="mb-4 border-bottom pb-3">
                <h5>🧪 {{ exam.exam_type }}</h5>

                <textarea name="result_text_{{ exam.id }}"
                          class="form-control mt-2"
                          rows="3"
                          placeholder="Saisir le résultat...">{{ exam.result_text or '' }}</textarea>
            </div>
            {% endfor %}

            <button class="btn btn-success w-100 mt-3">
                ✅ Valider les résultats
            </button>

        </div>
    </form>

</div>
{% endblock %}
