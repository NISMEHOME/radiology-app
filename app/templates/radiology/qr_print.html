<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>QR Code - Prise de rendez-vous</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: white;
            margin: 0;
            padding: 0;
        }

        .page {
            width: 210mm;
            height: 297mm;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 650px;
            border: 3px solid #0d6efd;
            border-radius: 25px;
            padding: 40px;
            text-align: center;
        }

        .logos {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logos img {
            height: 70px;
        }

        h1 {
            color: #0d6efd;
            font-size: 36px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 18px;
            color: #555;
            margin-bottom: 30px;
        }

        .qr img {
            width: 320px;
            height: 320px;
        }

        .url {
            font-size: 14px;
            color: #888;
            margin-top: 15px;
            word-break: break-all;
        }

        .footer {
            margin-top: 30px;
            font-size: 18px;
            color: #333;
        }

        .badge {
            display: inline-block;
            margin-top: 20px;
            background: #e7f1ff;
            color: #0d6efd;
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: bold;
        }

        @media print {
            body {
                margin: 0;
            }

            .page {
                width: 100%;
                height: 100%;
            }

            .card {
                border: 3px solid black;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

<div class="page">
    <div class="card">

        <!-- LOGOS -->
        <div class="logos">
            <img src="{{ url_for('static', filename='logo_coud.png') }}">
            <img src="{{ url_for('static', filename='logo_radiologie.png') }}">
        </div>

        <!-- TITRE -->
        <h1>Radiologie COUD</h1>
        <div class="subtitle">
            Scannez ce code pour prendre votre rendez-vous
        </div>

        <!-- QR -->
        <div class="qr">
            <img src="{{ url_for('static', filename=qr_path.replace('static/', '')) }}">
        </div>

        <!-- URL -->
        <div class="url">
            {{ url }}
        </div>

        <!-- FOOTER -->
        <div class="footer">
            🏥 Service Radiologie<br>
            ⚡ Rapide • Simple • Sécurisé
        </div>

        <div class="badge">
            Accès direct sans inscription
        </div>

    </div>
</div>

<script>
    window.onload = function() {
        window.print();
    }
</script>

</body>
</html>
